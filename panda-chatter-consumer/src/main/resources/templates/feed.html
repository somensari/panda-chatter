<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Chatter - Live Feed</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">

    <header class="header">
        <div class="logo">
            <span class="panda-face">
                <svg width="56" height="56" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="22" cy="22" r="18" fill="#1a1a1a"/>
                    <circle cx="78" cy="22" r="18" fill="#1a1a1a"/>
                    <circle cx="22" cy="22" r="10" fill="#555"/>
                    <circle cx="78" cy="22" r="10" fill="#555"/>
                    <circle cx="50" cy="55" r="40" fill="white" stroke="#e0e0e0" stroke-width="1"/>
                    <ellipse cx="34" cy="46" rx="12" ry="10" fill="#1a1a1a" transform="rotate(-15 34 46)"/>
                    <ellipse cx="66" cy="46" rx="12" ry="10" fill="#1a1a1a" transform="rotate(15 66 46)"/>
                    <circle cx="34" cy="46" r="5" fill="white"/>
                    <circle cx="66" cy="46" r="5" fill="white"/>
                    <circle cx="35" cy="47" r="3" fill="#1a1a1a"/>
                    <circle cx="67" cy="47" r="3" fill="#1a1a1a"/>
                    <circle cx="36" cy="46" r="1" fill="white"/>
                    <circle cx="68" cy="46" r="1" fill="white"/>
                    <ellipse cx="50" cy="62" rx="6" ry="4" fill="#1a1a1a"/>
                    <path d="M 40 70 Q 50 80 60 70" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                    <circle cx="26" cy="66" r="7" fill="#FFB3C1" opacity="0.5"/>
                    <circle cx="74" cy="66" r="7" fill="#FFB3C1" opacity="0.5"/>
                </svg>
            </span>
            <div class="logo-text">
                <h1>Panda Chatter</h1>
                <span class="badge consumer">Live Feed</span>
            </div>
        </div>
        <p class="tagline">Listening to the chat stream in real time</p>
    </header>

    <div class="card">
        <div class="feed-header">
            <h2>
                Live Messages
                <span class="count" id="msgCount">0</span>
            </h2>
            <div class="status-indicator">
                <span class="dot" id="statusDot"></span>
                <span id="statusText">Connecting...</span>
            </div>
        </div>

        <div id="messageFeed" class="message-list">
            <div class="empty-state" id="emptyState">
                <span>&#127963;</span>
                <p>Waiting for messages from the panda stream...</p>
            </div>
        </div>
    </div>

</div>

<script>
    const feed       = document.getElementById('messageFeed');
    const emptyState = document.getElementById('emptyState');
    const statusDot  = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const msgCount   = document.getElementById('msgCount');
    let   count      = 0;

    const evtSource = new EventSource('/feed/stream');

    evtSource.onopen = function () {
        statusDot.classList.add('connected');
        statusDot.classList.remove('disconnected');
        statusText.textContent = 'Connected';
    };

    evtSource.addEventListener('message', function (event) {
        const msg = JSON.parse(event.data);

        // Remove empty state on first message
        if (emptyState && emptyState.parentNode) {
            emptyState.parentNode.removeChild(emptyState);
        }

        const item = document.createElement('div');
        item.className = 'message-item received';
        item.innerHTML =
            '<div class="message-header">' +
            '  <span class="username">' + escapeHtml(msg.username) + '</span>' +
            '  <span class="timestamp">' + formatTime(msg.timestamp) + '</span>' +
            '</div>' +
            '<div class="message-content">' + escapeHtml(msg.content) + '</div>';

        // Prepend so newest is at top
        feed.insertBefore(item, feed.firstChild);

        // Update counter
        count++;
        msgCount.textContent = count;
    });

    evtSource.onerror = function () {
        statusDot.classList.remove('connected');
        statusDot.classList.add('disconnected');
        statusText.textContent = 'Reconnecting...';
    };

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(String(str)));
        return div.innerHTML;
    }

    function formatTime(timestamp) {
        if (!timestamp) return '';
        // LocalDateTime format: "2025-01-15T10:30:00"
        const timePart = timestamp.split('T')[1];
        return timePart ? timePart.substring(0, 8) : timestamp;
    }
</script>

</body>
</html>
