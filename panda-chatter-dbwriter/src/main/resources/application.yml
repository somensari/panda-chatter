spring:
  application:
    name: panda-chatter-dbwriter
  profiles:
    active: panda
  jackson:
    serialization:
      write-dates-as-timestamps: false

  # H2 in-memory database
  datasource:
    url: jdbc:h2:mem:pandachat;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: Panda Chatter DB Writer
    version: 1.0.0
