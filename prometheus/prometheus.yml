global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: panda-chatter

scrape_configs:
  - job_name: redpanda
    static_configs:
      - targets: ["redpanda:9644"]
    metrics_path: /metrics

  - job_name: redpanda_public
    static_configs:
      - targets: ["redpanda:9644"]
    metrics_path: /public_metrics

remote_write:
  - url: https://metric-api.newrelic.com/prometheus/v1/write?prometheus_server=panda-chatter
    bearer_token: ${NEW_RELIC_LICENSE_KEY}
